# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Sync from upstream OpenToonz (Agentic)
# Pulls new commits from opentoonz/opentoonz, applies them commit-by-commit,
# automatically rebrands all OpenToonz → Flare content, and opens a PR.
# Uses tools/sync/upstream_agent.py for smart conflict resolution so that
# Flare-specific changes and branding are never overwritten.

on:
  workflow_dispatch:
    inputs:
      max_commits:
        description: 'Max upstream commits to apply (default: 50)'
        required: false
        default: '50'
      dry_run:
        description: 'Dry run (list commits, do not apply)'
        required: false
        type: boolean
        default: false
      reset_state:
        description: 'Reset sync state (re-scan last 20 upstream commits)'
        required: false
        type: boolean
        default: false
  schedule:
    # Every Monday at 02:00 UTC
    - cron: '0 2 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: '1'
      BRANCH_NAME: sync-upstream-${{ github.run_id }}

    steps:
      - name: Checkout Flare
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create sync branch
        run: git checkout -b "$BRANCH_NAME"

      - name: Run upstream sync agent
        id: agent
        run: |
          ARGS="--max-commits ${{ inputs.max_commits || '50' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.reset_state }}" = "true" ]; then ARGS="$ARGS --reset-state"; fi

          python tools/sync/upstream_agent.py $ARGS 2>&1 | tee /tmp/sync_agent.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Check for new commits
        id: changes
        run: |
          COUNT=$(git log origin/master..HEAD --oneline | wc -l)
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Commits ahead of master: $COUNT"

      - name: Push sync branch
        if: steps.changes.outputs.commit_count != '0'
        run: git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: steps.changes.outputs.commit_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const log  = fs.existsSync('/tmp/sync_agent.log')
                       ? fs.readFileSync('/tmp/sync_agent.log', 'utf8').slice(-8000)
                       : '(log unavailable)';
            const count = '${{ steps.changes.outputs.commit_count }}';
            const body = [
              '## 🔄 Upstream sync from opentoonz/opentoonz',
              '',
              `Applied **${count}** upstream commit(s) with automatic Flare rebranding.`,
              '',
              '### What the agent did',
              '- Fetched new commits from `opentoonz/opentoonz`',
              '- Applied each commit individually (cherry-pick, not bulk merge)',
              '- Auto-rebranded: `OpenToonz→Flare`, `ToonzFolder→FlareFolder`,',
              '  `ToonzVersion→FlareVersion`, `systemVarPrefix TOONZ→FLARE`,',
              '  GitHub URLs, install paths, env vars, and more',
              '- Conflict resolution: branding-only conflicts kept Flare version;',
              '  functional conflicts took upstream code then rebranded it',
              '- Flare-only files (`.github/`, `flare/`, `README.md`, etc.)',
              '  were never touched by upstream',
              '',
              '### Review checklist',
              '- [ ] Build passes (CI will run automatically)',
              '- [ ] No unintended branding regressions',
              '- [ ] New upstream features work as expected',
              '- [ ] No Flare-specific code was removed',
              '',
              '<details><summary>Agent log</summary>',
              '',
              '```',
              log,
              '```',
              '</details>',
            ].join('\n');

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔄 Sync ${count} upstream commit(s) from opentoonz/opentoonz`,
              head:  process.env.BRANCH_NAME,
              base:  'master',
              body,
            });

      - name: No new commits
        if: steps.changes.outputs.commit_count == '0'
        run: echo "✅ Already up to date with opentoonz/opentoonz — no PR needed."

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-agent-log
          path: /tmp/sync_agent.log
          if-no-files-found: ignore
